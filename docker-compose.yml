name: deliveroojs

services:

  deliveroojs:

    build:
      dockerfile: Dockerfile
      context: .
    image: deliveroojs

    network_mode: bridge

    restart: unless-stopped

    deploy:
      resources:
        limits:
          memory: 2048M
        reservations:
          memory: 256M
    
    environment:
      - GAME_NAME=circuit_directional
      - PORT=4001

    ports: # not needed if proxied by caddy
      - "4001:4001"

    labels: # https://github.com/lucaslorentz/caddy-docker-proxy?tab=readme-ov-file#services
      caddy: 'deliveroojs.rtibdi.disi.unitn.it'
      caddy.reverse_proxy: '{{upstreams 4001}}'




